name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest + alembic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      PYTHONPATH: backend
      ANTHROPIC_API_KEY: ""
      APP_ENV: ci
      LOG_LEVEL: WARNING
      FRONTEND_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create data dir
        run: mkdir -p data

      - name: Alembic upgrade head (sqlite)
        env:
          DATABASE_URL: sqlite+aiosqlite:///${{ github.workspace }}/data/facemetrics.db
        run: python scripts/init_db.py

      - name: Import smoke
        run: python -c "from app.main import app; print('app import OK')"

      - name: Run pytest
        run: pytest backend/tests -v

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
