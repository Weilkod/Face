# Alembic configuration for FACEMETRICS backend.
#
# The actual database URL is loaded at runtime by alembic/env.py from
# `app.config.get_settings().database_url`, so the `sqlalchemy.url` value
# below is only a placeholder. Override per-environment via the .env file
# (see backend/.env.example) or `DATABASE_URL` env var.

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Template for migration filenames: 0001_short_slug.py
file_template = %%(rev)s_%%(slug)s

# Always treat revision filenames as plain ASCII so version sorting is
# deterministic across hosts.
truncate_slug_length = 40

# Allow .env-style INI variable interpolation.
prepend_sys_path = .

# Timezone for `revision --autogenerate` timestamps.
timezone = UTC

# Placeholder — the real URL is injected by env.py at runtime.
sqlalchemy.url = sqlite+aiosqlite:///../data/facemetrics.db


[post_write_hooks]
# No formatting hooks for now. Add black/ruff here later if desired.


# Logging configuration ------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
