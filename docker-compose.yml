services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/facemetrics.db
      - FRONTEND_ORIGIN=http://localhost:3000
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the Next.js bundle at build time for the browser.
        # The host-mapped port (8000) is what end-users reach.
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    environment:
      # Mirror for Node runtime (server components may re-read env).
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Server-side only — Next.js SSR running inside the FE container
      # reaches the backend via the compose network, not `localhost`.
      - INTERNAL_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
